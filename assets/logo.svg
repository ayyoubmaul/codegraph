<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160" fill="none" role="img" aria-label="codegraph">
  <title>codegraph</title>
  <defs>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f783ac"/>
      <stop offset="1" stop-color="#d6336c"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38d9a9"/>
      <stop offset="1" stop-color="#0ca678"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d6336c"/>
      <stop offset="1" stop-color="#0ca678"/>
    </linearGradient>
  </defs>

  <!-- icon: a community-colored knowledge graph (two clusters joined by a bridge edge) -->
  <g stroke-linecap="round">
    <!-- intra-cluster edges -->
    <line x1="62" y1="70" x2="46" y2="38" stroke="#d6336c" stroke-opacity="0.45" stroke-width="3"/>
    <line x1="62" y1="70" x2="34" y2="96" stroke="#d6336c" stroke-opacity="0.45" stroke-width="3"/>
    <line x1="118" y1="92" x2="138" y2="54" stroke="#0ca678" stroke-opacity="0.45" stroke-width="3"/>
    <line x1="118" y1="92" x2="96" y2="124" stroke="#0ca678" stroke-opacity="0.45" stroke-width="3"/>
    <!-- bridge edge: structural <-> semantic / cross-repo -->
    <line x1="62" y1="70" x2="118" y2="92" stroke="url(#bridge)" stroke-width="4.5"/>
  </g>
  <g>
    <!-- pink community -->
    <circle cx="46"  cy="38"  r="8"  fill="url(#pink)"/>
    <circle cx="34"  cy="96"  r="7"  fill="url(#pink)"/>
    <circle cx="62"  cy="70"  r="15" fill="url(#pink)"/>
    <!-- teal community -->
    <circle cx="138" cy="54"  r="8"  fill="url(#teal)"/>
    <circle cx="96"  cy="124" r="6"  fill="url(#teal)"/>
    <circle cx="118" cy="92"  r="13" fill="url(#teal)"/>
  </g>

  <!-- wordmark (monospace = code; two colors echo the two communities) -->
  <text x="182" y="98" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="56" font-weight="700" letter-spacing="-1">
    <tspan fill="#d6336c">code</tspan><tspan fill="#0ca678">graph</tspan>
  </text>
</svg>
